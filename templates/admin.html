<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>Admin panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="top-nav">
    <div class="nav-left">
        {% if is_admin %}
        <a href="/admin">🏠 Admin panel</a>
        {% endif %}
        <a href="/search">🔍 Vyhledávání</a>
        <a href="/routines">📋 Rutiny</a>
        <a href="/routine">＋ Nová rutina</a>
    </div>
    <div class="nav-right">
        <span class="user-label">Přihlášen jako: <b>{{ request.session.username }}</b></span>
        <div class="user-actions">
            <a href="/user/reset_password" class="btn-secondary">Změnit heslo</a>
            <a href="/logout" class="btn-logout">Odhlásit se</a>
        </div>
    </div>
</nav>
<h1>Admin panel</h1>
<div class="card" style="max-width:800px;">
    <h2>Správa uživatelů</h2>
    <a href="/admin/users" class="btn-main">Otevřít správu uživatelů</a>
</div>
</body>
</html>
