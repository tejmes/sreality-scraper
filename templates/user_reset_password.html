<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>Změna hesla</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
        }
        input[type="password"] {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            transition: border-color .2s, box-shadow .2s;
        }
        input[type="password"]:focus {
            border-color: #2563eb;
            outline: none;
        }
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }
        .links a {
            color: #2563eb;
            text-decoration: none;
        }
        .links a:hover {
            background: #fff;
        }
    </style>
</head>
<body>
<div class="card">
    <h1 style="margin-top:0;text-align:center;">Změna hesla</h1>
    <form method="post" action="/user/reset_password">
        <div>
            <label for="old_password">Původní heslo:</label>
            <input type="password" id="old_password" name="old_password" required>
        </div>
        <div>
            <label for="new_password">Nové heslo:</label>
            <input type="password" id="new_password" name="new_password" required>
        </div>
        <div>
            <label for="confirm_password">Potvrdit nové heslo:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit">Změnit heslo</button>
        {% if error %}
            {% if "✅" in error %}
                <p style="color:#16a34a;">{{ error }}</p>
            {% else %}
                <p style="color:#dc2626;">{{ error }}</p>
            {% endif %}
        {% endif %}
    </form>
    <div class="links">
        <a href="/search">← Zpět</a>
        <a href="/logout">Odhlásit se</a>
    </div>
</div>
</body>
</html>
