<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>Změna hesla</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f9fafb;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #fff;
            padding: 2rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #111827;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        label {
            font-weight: 500;
            color: #374151;
            margin-bottom: .25rem;
        }
        input[type="password"] {
            width: 100%;
            padding: .6rem .8rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color .2s, box-shadow .2s;
        }
        input[type="password"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
            outline: none;
        }
        button {
            background: #2563eb;
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            padding: .75rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover {
            background: #1e40af;
        }
        .error {
            margin-top: .5rem;
            font-size: .95rem;
            text-align: center;
            color: #dc2626;
        }
        .success {
            margin-top: .5rem;
            font-size: .95rem;
            text-align: center;
            color: #16a34a;
        }
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-size: .95rem;
        }
        .links a {
            color: #2563eb;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Změna hesla</h1>

    <form method="post" action="/user/reset_password">
        <div>
            <label for="old_password">Původní heslo:</label>
            <input type="password" id="old_password" name="old_password" required>
        </div>

        <div>
            <label for="new_password">Nové heslo:</label>
            <input type="password" id="new_password" name="new_password" required>
        </div>

        <div>
            <label for="confirm_password">Potvrdit nové heslo:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>

        <button type="submit">Změnit heslo</button>

        {% if error %}
            {% if "✅" in error %}
                <p class="success">{{ error }}</p>
            {% else %}
                <p class="error">{{ error }}</p>
            {% endif %}
        {% endif %}
    </form>

    <div class="links">
        <a href="/search">← Zpět</a>
        <a href="/logout">Odhlásit se</a>
    </div>
</div>
</body>
</html>
