<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>Přihlášení</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin:2rem; }
        .card { max-width:400px; margin:auto; border:1px solid #ddd; border-radius:12px; padding:2rem; background:#fff; }
        h1 { margin-bottom:1rem; }
        input { width:100%; padding:.6rem; border:1px solid #ccc; border-radius:6px; margin-bottom:1rem; }
        button { width:100%; padding:.7rem; background:#0d6efd; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer; }
        button:hover { background:#0b5ed7; }
        .error { color:#dc2626; margin-bottom:1rem; }
    </style>
</head>
<body>
<div class="card">
    <h1>Přihlášení administrátora</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Uživatel" required>
        <input type="password" name="password" placeholder="Heslo" required>
        <button type="submit">Přihlásit se</button>
    </form>
</div>
</body>
</html>
